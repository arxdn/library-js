name: CI
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
concurrency: ${{ github.workflow }}-${{ github.ref }}
jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22']
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build Packages
        run: npm run build -w packages/shared -w packages/toast

      - name: Typecheck
        run: npm run typecheck -w packages/shared -w packages/toast
